<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{layout/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{layout/fragmentos :: header}"></header>
        <div class="container mt-4">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h4><i class="fas fa-calendar-alt"></i> Reservas de Citas</h4>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Fecha</th>
                                <th>Servicio</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${reservas}">
                                <td th:text="${r.nombreCliente}"></td>
                                <td th:text="${#dates.format(r.fecha, 'dd/MM/yyyy')}"></td>
                                <td th:text="${r.servicio.nombre}"></td>
                                <td th:text="'₡' + ${r.servicio.precio}"></td>
                                <td>
                                    <a th:href="@{/reserva/eliminar/}+${r.id}" class="btn btn-outline-danger btn-sm">Cancelar</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer th:replace="~{layout/fragmentos :: footer}"></footer>
    </body>
</html>
