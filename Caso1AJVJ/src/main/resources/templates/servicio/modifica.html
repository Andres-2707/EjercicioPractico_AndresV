<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{layout/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{layout/fragmentos :: header}"></header>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow">
                        <div class="card-header bg-warning"><h4>Actualizar Servicio</h4></div>
                        <div class="card-body">
                            <form th:action="@{/servicio/guardar}" th:object="${servicio}" method="POST">
                                <input type="hidden" th:field="*{id}"/>
                                <div class="mb-3">
                                    <label class="form-label">Nombre del Servicio</label>
                                    <input type="text" class="form-control" th:field="*{nombre}" required/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Precio (₡)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{precio}" required/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Categoría</label>
                                    <select class="form-select" th:field="*{categoria.id}">
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                                    </select>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <a th:href="@{/servicio/listado}" class="btn btn-secondary">Regresar</a>
                                    <button type="submit" class="btn btn-success">Guardar Cambios</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{layout/fragmentos :: footer}"></footer>
    </body>
</html>
