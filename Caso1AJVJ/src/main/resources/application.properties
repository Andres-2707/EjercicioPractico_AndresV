# Aplicación configurada para ejecutarse en el puerto 47
server.port=47

# Conexión a la base de datos salon_belleza
spring.datasource.url=jdbc:mysql://localhost:3306/salon_belleza?serverTimezone=UTC
spring.datasource.username=usuario_ejercicio_practico_01
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialecto de Hibernate para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuración de logs y desarrollo
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=TRACE
spring.main.banner-mode=off
spring.thymeleaf.cache=false